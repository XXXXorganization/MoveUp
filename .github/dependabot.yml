version: 2
updates:
  # 1. 自动检查 Android 前端依赖 (Gradle)
  - package-ecosystem: "gradle"
    # 根据你之前的目录结构，Gradle 的配置文件在 /frontend/code 目录下
    directory: "/frontend/code" 
    schedule:
      interval: "weekly" # 每周检查一次，避免每天发 PR 骚扰你

  # 2. 自动检查后端依赖 (npm)
  - package-ecosystem: "npm"
    directory: "/backend"
    schedule:
      interval: "weekly"

  # 3. 自动检查 GitHub Actions 插件的版本更新 (比如 actions/checkout)
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"