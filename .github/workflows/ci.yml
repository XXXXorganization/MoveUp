name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # ================= 后端测试任务 =================
  backend-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: moveup
          POSTGRES_PASSWORD: moveup_test
          POSTGRES_DB: moveup_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v6
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      - name: Install dependencies
        working-directory: ./backend
        run: npm ci
      - name: Run migrations
        working-directory: ./backend
        run: npx knex migrate:latest --env test
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USER: moveup
          DB_PASSWORD: moveup_test
          DB_NAME: moveup_test
      - name: Run tests
        working-directory: ./backend
        run: npm test
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USER: moveup
          DB_PASSWORD: moveup_test
          DB_NAME: moveup_test
      - name: Upload Backend Coverage
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: backend/coverage.xml
          flags: backend
          name: moveup-backend

  # ================= 前端 Android 测试任务 =================
  frontend-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle
          
      - name: Grant execute permission for gradlew
        # 🌟 修改 1：进入 code 文件夹
        working-directory: ./frontend/code
        run: chmod +x gradlew
        
      - name: Run Android Tests & Generate Report
        # 🌟 修改 2：进入 code 文件夹
        working-directory: ./frontend/code
        run: ./gradlew :app:testDebugUnitTest :app:jacocoTestReport
        
      - name: Upload Frontend Coverage
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          # 🌟 修改 3：确保读取 XML 的路径加上了 code/ 层级
          files: frontend/code/app/build/reports/jacoco/jacocoTestReport/jacocoTestReport.xml
          flags: frontend
          name: moveup-frontend