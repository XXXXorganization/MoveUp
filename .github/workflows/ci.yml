name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # ── Job 1：单元测试（无需数据库，始终运行）──────────────────────────
  unit-test:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: backend
        run: npm ci

      - name: Run unit tests with coverage
        working-directory: backend
        run: npx jest tests/unit/ --coverage
        env:
          NODE_ENV: test
          DEEPSEEK_API_KEY: test-placeholder

      - name: Upload unit coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          directory: backend/coverage
          flags: unit
          fail_ci_if_error: true

  # ── Job 2：集成测试（带 PostgreSQL 服务容器）──────────────────────────
  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: moveup
          POSTGRES_PASSWORD: moveup_test
          POSTGRES_DB: moveup_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: backend
        run: npm ci

      - name: Run database migrations
        working-directory: backend
        run: npm run migrate
        env:
          NODE_ENV: test
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USER: moveup
          DB_PASSWORD: moveup_test
          DB_NAME: moveup_test

      - name: Run integration tests with coverage
        working-directory: backend
        run: npx jest "tests/[^/]+\.test\.(ts|js)$" --coverage
        env:
          NODE_ENV: test
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USER: moveup
          DB_PASSWORD: moveup_test
          DB_NAME: moveup_test
          JWT_SECRET: test-secret
          DEEPSEEK_API_KEY: test-placeholder

      - name: Upload integration coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          directory: backend/coverage
          flags: integration
          fail_ci_if_error: true
