name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: moveup
          POSTGRES_PASSWORD: moveup_test
          POSTGRES_DB: moveup_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: ./backend
        run: npm ci

      # ✅ 这是最安全的迁移命令（全新数据库，直接跑就行）
      - name: Run migrations
        working-directory: ./backend
        run: npx knex migrate:latest --env test
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USER: moveup
          DB_PASSWORD: moveup_test
          DB_NAME: moveup_test

      - name: Run tests
        working-directory: ./backend
        run: npm test
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USER: moveup
          DB_PASSWORD: moveup_test
          DB_NAME: moveup_test